"$schema" = "https://starship.rs/config-schema.json"

format = """
$username\
$hostname\
$os\
$python\
[î‚°](fg:black bg:blue)\
$directory\
[î‚°](fg:blue bg:green)\
$git_branch\
$git_commit\
$git_state\
$git_status\
\n\
$character"""

right_format = """
$jobs\
$kubernetes\
$terraform\
$aws\
$azure\
$gcloud\
$nix_shell\
$time"""

add_newline = false
command_timeout = 500

[username]
style_user = "fg:white bg:black"
style_root = "fg:white bg:black"
format = "[ $user]($style)"
disabled = false
show_always = true

[hostname]
ssh_only = false
format = "[@](fg:white bg:black)[$hostname]($style)"
style = "fg:white bg:black"
disabled = false

[os]
format = "[ $symbol ]($style)"
style = "fg:white bg:black"
disabled = false

[python]
format = "[ ($virtualenv) ]($style)"
style = "fg:cyan bg:black"
detect_extensions = []
detect_files = []
detect_folders = []
detect_env_vars = ["VIRTUAL_ENV"]
pyenv_version_name = false
disabled = false

[directory]
format = "[$read_only]($read_only_style)[ $path ]($style)"
style = "fg:black bg:blue"
read_only_style = "fg:black bg:blue"
disabled = false
read_only = " ï€£"
truncate_to_repo = false
truncation_length = 1
truncation_symbol = ""
home_symbol = "~"

[git_branch]
format = "[$symbol$branch(:$remote_branch) ]($style)"
symbol = " ï„¦ "
style = "fg:black bg:green"
truncation_length = 32
truncation_symbol = "â€¦"

[git_commit]
format = "[#$hash ]($style)"
style = "fg:black bg:green"
commit_hash_length = 8
only_detached = true
tag_disabled = false
tag_symbol = "#"

[git_state]
format = "([î‚°](fg:green bg:yellow)[ $state( $progress_current/$progress_total) ]($style)[î‚°](fg:yellow))"
style = "fg:red bg:yellow"

[git_status]
format = "([î‚°](fg:green bg:yellow)[ $all_status$ahead_behind ]($style)[î‚°](fg:yellow))([$up_to_date](fg:green))"
style = "fg:black bg:yellow"
stashed = "*${count}"
ahead = "â‡،${count}"
behind = "â‡£${count}"
diverged = "â‡£${behind_count}â‡،${ahead_count}"
conflicted = "~${count}"
deleted = "âœک${count}"
renamed = "آ»${count}"
modified = "!${count}"
staged = "+${count}"
untracked = "u${count}"
typechanged = ""
up_to_date = ""

[character]
format = "$symbol "
success_symbol = "[â‌¯](fg:76)"
error_symbol = "[â‌¯](fg:196)"
vimcmd_symbol = "[â‌®](fg:76)"
vimcmd_visual_symbol = "[V](fg:76)"
vimcmd_replace_symbol = "[â–¶](fg:76)"
vimcmd_replace_one_symbol = "[â–¶](fg:76)"

[jobs]
format = "[î‚²](fg:black)[ $symbol ]($style)"
symbol = "âœ¦"
style = "fg:cyan bg:black"
threshold = 1
number_threshold = 999
symbol_threshold = 1
disabled = false

[kubernetes]
format = "[î‚²](fg:purple)[ $symbol$context(/$namespace) ]($style)"
symbol = "âک¸ "
style = "fg:white bg:purple"
