#:schema https://mise.en.dev/schema/mise.json

[tools]
"pipx:headroom-ai" = { version = "latest", extras = "proxy,code,ml,pytorch-mps" }
"pipx:plamo-translate" = "latest"

[bootstrap.packages]
# For macOS
"brew:coreutils" = "latest"
"brew:curl" = "latest"
"brew:ffmpeg" = "latest"
"brew:git" = "latest"
"brew:gitleaks" = "latest"
"brew:htop" = "latest"
"brew:librsvg" = "latest"
"brew:llvm" = "latest"
"brew:mactop" = "latest"
"brew:mcat" = "latest"
"brew:mysql" = "latest"
"brew:ninja" = "latest"
"brew:resvg" = "latest"
"brew:subversion" = "latest"
"brew:swiftlint" = "latest"
"brew:tree" = "latest"
"brew:wget" = "latest"
"brew:watch" = "latest"
"brew-cask:alt-tab" = "latest"
"brew-cask:bettertouchtool" = "latest"
"brew-cask:chatgpt" = "latest"
"brew-cask:font-roboto-mono-nerd-font" = "latest"
"brew-cask:hammerspoon" = "latest"
"brew-cask:homerow" = "latest"
"brew-cask:iterm2" = "latest"
"brew-cask:keycastr" = "latest"
"brew-cask:ollama-app" = "latest"
"brew-cask:thaw" = "latest"
"brew-cask:visual-studio-code" = "latest"
"brew-cask:mjun0812/roboto-mono-jp/font-roboto-mono-jp" = "latest"
"brew-cask:cursor" = "latest"
"brew-cask:chatgpt-classic" = "latest"
"brew-cask:clipy" = "latest"
"brew-cask:ghostty" = "latest"
"brew-cask:balenaetcher" = "latest"
"brew-cask:notion" = "latest"
"brew-cask:obsidian" = "latest"
"brew-cask:nani" = "latest"
"brew-cask:deepl" = "latest"
"brew-cask:claude" = "latest"
"brew:vjeantet/tap/alerter" = "latest"
"brew-cask:codexbar" = "latest"
"brew-cask:discord" = "latest"

[bootstrap.macos.launchd.agents.headroom-proxy]
program = "~/.local/share/mise/shims/headroom"
args = [
  "proxy",
  "--host",
  "127.0.0.1",
  "--port",
  "8787",
  "--mode",
  "token",
  "--no-telemetry",
  "--disable-kompress",
  "--lossless",
  "--code-aware",
  "--intercept-tool-results",
]
run_at_load = true
keep_alive = true
environment = { HEADROOM_EMBEDDER_RUNTIME = "pytorch_mps" }

[bootstrap.brew.taps]
"mjun0812/roboto-mono-jp" = "https://github.com/mjun0812/homebrew-roboto-mono-jp.git"
"vjeantet/tap" = "https://github.com/vjeantet/homebrew-tap.git"

[tasks.no-sleep-mac]
description = "No Sleep Mode for macOS"
run = "caffeinate -dims"
