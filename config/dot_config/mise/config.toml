[tools]
# Languages & Runtimes
go = "latest"
rust = "latest"
node = "lts"
bun = "latest"
pnpm = "latest"
cmake = "latest"

# Shell & CLI utilities
dust = "latest"
"cargo:eza" = "latest"
jq = "latest"
starship = "latest"
tmux = "latest"
usage = "latest"
yazi = "latest"
yq = "latest"
zoxide = "latest"
"aqua:sharkdp/bat" = "latest"
"aqua:sharkdp/fd" = "latest"
"aqua:BurntSushi/ripgrep" = "latest"
"aqua:phiresky/ripgrep-all" = "latest"

# Editor
tree-sitter = "latest"
"aqua:neovim/neovim" = "latest"

# Git
delta = "latest"
git-lfs = "latest"
gh = "latest"
ghq = "latest"
lazygit = "latest"
"github:d-kuro/gwq" = "latest"

# Dev tooling
actionlint = "latest"
aqua = "latest"
container = { version = "latest", os = ["macos"] }
gcloud = "latest"
herdr = "latest"
imagemagick = { version = "latest", os = ["macos"] }
"aqua:imagemagick" = { version = "latest", os = ["linux"] }
kubectl = "latest"
pre-commit = "latest"
prek = "latest"
sheldon = "latest"
shellcheck = "latest"
shfmt = "latest"
"aqua:aws/aws-cli" = "latest"
"github:WGUNDERWOOD/tex-fmt" = "latest"
"github:runpod/runpodctl" = "latest"
"github:router-for-me/CLIProxyAPI" = "latest"

# AI coding agents
"aqua:anthropics/claude-code" = "latest"
"aqua:openai/codex" = "latest"
opencode = "latest"
"aqua:google-antigravity/antigravity-cli" = "latest"
"npm:@github/copilot" = "latest"

[settings]
idiomatic_version_file_enable_tools = []
pipx.uvx = true
npm.package_manager = "bun"
trusted_config_paths = ["/"]
minimum_release_age = "24h"
minimum_release_age_excludes = ["claude", "codex", "aqua:google-antigravity/antigravity-cli"]
auto_env = true
not_found_auto_install = false
experimental = true

[tasks.headroom-proxy]
description = "Start the Headroom proxy"
run = "headroom proxy --host 127.0.0.1 --port 8787 --no-telemetry --disable-kompress"

[bootstrap.packages]
# For macOS
"brew:alerter" = "latest"
"brew:coreutils" = "latest"
"brew:curl" = "latest"
"brew:ffmpeg" = "latest"
"brew:git" = "latest"
"brew:gitleaks" = "latest"
"brew:htop" = "latest"
"brew:librsvg" = "latest"
"brew:llvm" = "latest"
"brew:mactop" = "latest"
"brew:mcat" = "latest"
"brew:mysql" = "latest"
"brew:ninja" = "latest"
"brew:resvg" = "latest"
"brew:subversion" = "latest"
"brew:swiftlint" = "latest"
"brew:tree" = "latest"
"brew:wget" = "latest"
"brew:watch" = "latest"
"brew-cask:iterm2" = "latest"

[bootstrap.macos.launchd.agents.headroom-proxy]
program = "~/.local/bin/headroom"
args = ["proxy", "--host", "127.0.0.1", "--port", "8787", "--no-telemetry", "--disable-kompress"]
run_at_load = true
keep_alive = true
environment = { PATH = "/Users/mjun/.local/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin", HEADROOM_EMBEDDER_RUNTIME = "pytorch_mps" }
