[tools]
# Languages & Runtimes
go = "latest"
rust = "latest"
node = "lts"
bun = "latest"
pnpm = "latest"
cmake = "latest"

# Shell & CLI utilities
dust = "latest"
eza = "latest"
jq = "latest"
starship = "latest"
tmux = "latest"
yazi = "latest"
yq = "latest"
zoxide = "latest"
"aqua:sharkdp/bat" = "latest"
"aqua:sharkdp/fd" = "latest"
"aqua:BurntSushi/ripgrep" = "latest"
"aqua:phiresky/ripgrep-all" = "latest"

# Editor
tree-sitter = "latest"
"aqua:neovim/neovim" = "latest"

# Git
delta = "latest"
git-lfs = "latest"
gh = "latest"
ghq = "latest"
lazygit = "latest"
"github:d-kuro/gwq" = "latest"

# Dev tooling
actionlint = "latest"
aqua = "latest"
chezmoi = "latest"
gcloud = "latest"
kubectl = "latest"
pre-commit = "latest"
prek = "latest"
sheldon = "latest"
shellcheck = "latest"
shfmt = "latest"
"aqua:aws/aws-cli" = "latest"
"github:WGUNDERWOOD/tex-fmt" = "latest"

# AI coding agents
claude = "latest"
codex = "latest"
gemini-cli = "latest"
opencode = "latest"
"aqua:google-antigravity/antigravity-cli" = "latest"
"npm:@github/copilot" = "latest"

[settings]
idiomatic_version_file_enable_tools = []
pipx.uvx = true
npm.package_manager = "bun"
# Set registry_url for fetch latest version
aqua.registry_url = "https://github.com/aquaproj/aqua-registry"
aqua.registry_cache_ttl = "1d"
aqua.baked_registry = true
trusted_config_paths = ["/"]
minimum_release_age = "24h"
minimum_release_age_excludes = ["claude", "codex", "aqua:google-antigravity/antigravity-cli"]
