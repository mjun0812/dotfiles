# ~/.gemini/commands/aipr.toml

description = "Generate pull request for current branch with AI-generated title and description in the specified language (default: English)."
prompt = """
User Argument: "{{args}}"

1. **Determine Language:**
   - If "User Argument" specifies Japanese (e.g., "ja", "jp", "japanese") or the user asks for Japanese, the PR title and description MUST be in **Japanese**.
   - If "User Argument" is empty or specifies English, the PR title and description MUST be in **English**.
   - If another language is specified, use that language.

2. **Gather Context:**
   Use the following commands to understand the branch status and changes:
   - `git status`
   - `git branch --show-current`
   - `git fetch origin && git merge-base --is-ancestor origin/main HEAD` (Verify branch is derived from main)
   - `git log --oneline origin/main..HEAD` (List of commits)
   - `git log -p origin/main..HEAD` (List of changes)

3. **Select Template:**
   - Check if a PR template exists in the repository (e.g., `.github/pull_request_template.md`). If it exists, use it and fill it out in the determined language.
   - If NO repository template exists, use the appropriate **Default Template** below based on the determined language.

   **Default Template (English):**
   ```markdown
   ## Overview

   <!-- Describe the purpose of this PR in short. -->

   ## Changes

   <!-- Describe the changes made in this PR in bullet points. -->

   ## Test Instructions

   <!-- Describe the test instructions for this PR. -->
   ```

   **Default Template (Japanese):**
   ```markdown
   ## 概要

   <!-- このPRは何を目的としているかを簡潔に一言で記載してください -->

   ## 変更内容

   <!-- このPRで行われた変更を箇条書きで記載してください -->

   ## テスト方法

   <!-- このPRのテスト方法を記載してください -->
   ```

4. **Generate Content & Create PR:**
   - Generate the PR Title and Body.
   - Execute `gh pr create --title "<Generated Title>" --body "<Generated Body>"`.
   - Return the URL of the created PR.
"""