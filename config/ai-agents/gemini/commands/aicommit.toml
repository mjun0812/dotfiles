# config/ai-agents/gemini/commands/aicommit.toml

description = "AIが生成したコミットメッセージを使用して、ステージングされた変更をコミットします（デフォルトは英語、引数で言語指定可）。"
prompt = """
重要：このコマンドはステージングされた変更のみをコミットします。新しいファイルを追加することはありません。

ユーザー引数: "{{args}}"

## コンテキスト
- ステージングされた変更: `git diff --cached`
- Git ステータス: `git status`
- 現在のブランチ: `git branch --show-current`
- 最近のコミット: `git log -10 --oneline`

## Tasks

1. `git diff --cached`, `git status`, `git branch --show-current`, `git log -10 --oneline` を使用して、ステージングされた変更、ブランチ、最近のコミットを確認してください。

2. 「ユーザー引数」に基づいて出力言語を決定してください。
   - 日本語が指定されている場合（例: "ja", "jp", "japanese"）、コミットメッセージは必ず**日本語**にしてください。
   - 引数が空、または英語が指定されている場合（例: "en", "english"）、コミットメッセージは必ず**英語**にしてください。
   - その他の言語が指定されている場合は、その言語を使用してください。

3. ステージングされた変更を要約した、簡潔で分かりやすいコミットメッセージを Conventional Commits 形式で生成してください。
   - 1行目（タイトル）の後に1行空行を入れ、3行目から箇条書きで詳細を記述してください。
   - タイトルにスコープ（カッコ内）を含めないでください。
   - 決定した言語を厳守してください。

4. 生成したメッセージを使用して `git commit -m "<コミットメッセージ>"` を実行し、変更をコミットしてください。

5. 最後に、生成されたコミットメッセージの全文のみを表示して、ユーザーに知らせてください。
"""
