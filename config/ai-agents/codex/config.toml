# dotfiles-managed:start
#:schema https://developers.openai.com/codex/config-schema.json

model = "gpt-5.5"
model_reasoning_effort = "high"

approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"
allow_login_shell = true
approvals_reviewer = "user"
suppress_unstable_features_warning = true

[features]
collaboration_modes = true
shell_snapshot = true
multi_agent = true
remote_control = true

[agents]
max_threads = 16
max_depth = 4

[sandbox_workspace_write]
writable_roots = ["~/.cache", "~/.local/share", "/tmp", "/private/tmp"]
network_access = true
exclude_tmpdir_env_var = false
exclude_slash_tmp = false

[shell_environment_policy]
inherit = "all"

[notice]
hide_rate_limit_model_nudge = true

[tui]
status_line = [
  "model-with-reasoning",
  "context-used",
  "used-tokens",
  "weekly-limit",
  "five-hour-limit",
  "current-dir",
  "git-branch",
]

[tui.keymap.editor]
insert_newline = ["ctrl-j", "ctrl-m", "enter", "shift-enter", "alt-enter"]

[mcp_servers.chrome-devtools]
command = "bunx"
args = ["chrome-devtools-mcp@latest"]

[mcp_servers.context7]
command = "bunx"
args = ["@upstash/context7-mcp@latest"]

[mcp_servers.drawio]
command = "bunx"
args = ["@drawio/mcp@latest"]

[mcp_servers.playwright]
command = "bunx"
args = ["@playwright/mcp@latest"]

[plugins."github@openai-curated"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."chrome@openai-bundled"]
enabled = true
# dotfiles-managed:end

[projects."/Users/mjun/.dotfiles"]
trust_level = "trusted"

[projects."/home/mjun/.dotfiles"]
trust_level = "trusted"
