description = "Generate pull request for current branch with AI-generated title and description."
prompt = """
## Context

- 現在のgitステータス: !`git status`
- 現在のブランチ: !`git branch --show-current`
- ブランチの派生元: !`git merge-base --is-ancestor origin/main HEAD`
- ブランチの変更差分のコミット一覧: !`git fetch origin && git log --oneline origin/main..HEAD`
- このブランチの変更差分一覧: !`git fetch origin && git log -p origin/main..HEAD`

## Task

MUST: 生成されたプルリクエストのタイトルと説明は日本語である必要があります。
MUST: 現在のリポジトリにPRのテンプレートファイル(`.github/pull_request_template.md`, `.github/PULL_REQUEST_TEMPLATE.md`など)が存在する場合は、その内容に従ってプルリクエストを作成します。

1. $ARGUMENTS に指定された指示があれば，それに従ってプルリクエストを作成します。
2. 現在のブランチが`main`から派生していることを確認します。
3. 現在のブランチの状態と変更差分を確認します。
4. 現在のリポジトリにPRのテンプレートファイル(`.github/pull_request_template.md`, `.github/PULL_REQUEST_TEMPLATE.md`など)が存在する場合は、その内容に従ってプルリクエストを作成します。存在しない場合は、[下記テンプレート](#pull-request-template)に従ってPRのタイトルと説明を作成してください。
5. 作成したPRのタイトルと説明を使用して、`gh pr create`を使用してプルリクエストを作成します。
6. 作成したPRのURLを返答してください。

## Pull Request Template

```markdown
## 概要

<!-- このPRは何を目的としているかを簡潔に一言で記載してください -->

## 変更内容

<!-- このPRで行われた変更を箇条書きで記載してください -->

## テスト方法

<!-- このPRのテスト方法を記載してください -->
```
"""
