\n\
$character"""

add_newline = false

[username]
style_user = 'fg:white bg:black'
style_root = 'fg:white bg:black'
format = '[ $user]($style)'
disabled = false
show_always = true

[hostname]
ssh_only = false
format = '[@](fg:white bg:black)[$hostname]($style)'
style = 'fg:white bg:black'
disabled = false

[character]
success_symbol = "[ÔØ»](fg:76)"
error_symbol = "[ÔØ»](fg:196)"

[directory]
format = '[$read_only]($read_only_style)[ $path ]($style)'
style = 'fg:black bg:blue'
read_only_style = 'fg:black bg:blue'
disabled = false
read_only = " ´Çú"
truncate_to_repo = false

[git_branch]
format = "[$symbol$branch(:$remote_branch) ]($style)"
symbol = " ´äª "
style = "fg:black bg:green"

[git_status]
format = '([¯é░](fg:green bg:yellow)[ $all_status$ahead_behind ]($style)[¯é░](fg:yellow))([$up_to_date](fg:green))'
style = "fg:black bg:yellow"
stashed = '\$${count}'
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
up_to_date = ""
diverged = "Ôçò"
conflicted = "="
deleted = "Ô£ÿ"
renamed = "┬╗"
modified = "!${count}"
staged = "+"
