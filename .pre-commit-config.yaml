repos:
  - repo: local
    hooks:
      - id: oxfmt
        name: oxfmt
        entry: oxfmt
        language: system
        types_or: [markdown, json, yaml, javascript, jsx, ts, tsx, css]
        exclude: ^config/ai-agents/claude/settings\.json$
        pass_filenames: true

      - id: shfmt
        name: shfmt
        entry: shfmt -w -s -i 4
        language: system
        types: [shell]
        exclude_types: [zsh]
        pass_filenames: true

      # p10k.zsh: powerlevel10k configureが生成するファイルのため対象外
      # alias.zsh: zshの短縮for構文がshfmt v3.13ではパースできないため対象外
      - id: shfmt-zsh
        name: shfmt (zsh)
        entry: shfmt -w -s -i 4 --ln=zsh
        language: system
        types: [zsh]
        exclude: ^config/dot/(p10k|alias)\.zsh$
        pass_filenames: true
