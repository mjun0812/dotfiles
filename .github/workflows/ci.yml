name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-macos:
    name: Test on macOS
    runs-on: macos-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: zsh {0}
    env:
      NONINTERACTIVE: "1"
      CI: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run install script
        run: |
          ./install.sh

      - name: Verify symlinks (dotfiles)
        run: |
          echo "=== Checking dotfile symlinks ==="
          for f in config/dot/*; do
            name=".$(basename "$f")"
            if [[ -L "$HOME/$name" ]]; then
              echo "✓ $name is a symlink"
            else
              echo "✗ $name is NOT a symlink"
              exit 1
            fi
          done

      - name: Verify symlinks (config)
        run: |
          echo "=== Checking .config symlinks ==="
          for d in config/dot_config/*; do
            name=$(basename "$d")
            if [[ -L "$HOME/.config/$name" ]]; then
              echo "✓ .config/$name is a symlink"
            else
              echo "✗ .config/$name is NOT a symlink"
              exit 1
            fi
          done

      - name: Verify mise installation
        run: |
          echo "=== Checking mise ==="
          source "$HOME/.zshrc"
          mise --version
          echo "✓ mise is installed"

      - name: Verify uv installation
        run: |
          echo "=== Checking uv ==="
          source "$HOME/.zshrc"
          uv --version
          echo "✓ uv is installed"

      - name: Verify sheldon installation
        run: |
          echo "=== Checking sheldon ==="
          source "$HOME/.zshrc"
          sheldon --version
          echo "✓ sheldon is installed"

      - name: Verify Node.js (via mise)
        run: |
          echo "=== Checking Node.js ==="
          source "$HOME/.zshrc"
          node --version
          echo "✓ Node.js is installed"

      - name: Verify bun (via mise)
        run: |
          echo "=== Checking bun ==="
          source "$HOME/.zshrc"
          bun --version
          echo "✓ bun is installed"

      - name: Verify Python virtual environment
        run: |
          echo "=== Checking Python venv ==="
          source "$HOME/.zshrc"
          source "$HOME/.venv/bin/activate"
          python --version
          echo "✓ Python venv is configured"

  test-ubuntu:
    name: Test on Ubuntu (Container)
    runs-on: ubuntu-slim
    timeout-minutes: 45
    container:
      image: ubuntu:latest
    env:
      NONINTERACTIVE: "1"
      CI: "true"
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Install prerequisites
        run: |
          apt-get update
          apt-get install -y \
            zsh \
            curl \
            git \
            sudo \
            ca-certificates \
            build-essential

      - name: Create test user
        run: |
          useradd -m -s /bin/zsh testuser
          echo "testuser ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: dotfiles

      - name: Move dotfiles to testuser home
        run: |
          mv dotfiles /home/testuser/.dotfiles
          chown -R testuser:testuser /home/testuser/.dotfiles

      - name: Run install script
        run: |
          su - testuser -c 'cd ~/.dotfiles && zsh ./install.sh'

      - name: Verify symlinks (dotfiles)
        shell: zsh {0}
        run: |
          echo "=== Checking dotfile symlinks ==="
          cd /home/testuser/.dotfiles
          for f in config/dot/*; do
            name=".$(basename "$f")"
            if [[ -L "/home/testuser/$name" ]]; then
              echo "✓ $name is a symlink"
            else
              echo "✗ $name is NOT a symlink"
              exit 1
            fi
          done

      - name: Verify symlinks (config)
        shell: zsh {0}
        run: |
          echo "=== Checking .config symlinks ==="
          cd /home/testuser/.dotfiles
          for d in config/dot_config/*; do
            name=$(basename "$d")
            if [[ -L "/home/testuser/.config/$name" ]]; then
              echo "✓ .config/$name is a symlink"
            else
              echo "✗ .config/$name is NOT a symlink"
              exit 1
            fi
          done

      - name: Verify mise installation
        run: |
          echo "=== Checking mise ==="
          su - testuser -c 'source ~/.zshrc && mise --version'
          echo "✓ mise is installed"

      - name: Verify uv installation
        run: |
          echo "=== Checking uv ==="
          su - testuser -c 'source ~/.zshrc && uv --version'
          echo "✓ uv is installed"

      - name: Verify sheldon installation
        run: |
          echo "=== Checking sheldon ==="
          su - testuser -c 'source ~/.zshrc && sheldon --version'
          echo "✓ sheldon is installed"

      - name: Verify Node.js (via mise)
        run: |
          echo "=== Checking Node.js ==="
          su - testuser -c 'source ~/.zshrc && node --version'
          echo "✓ Node.js is installed"

      - name: Verify bun (via mise)
        run: |
          echo "=== Checking bun ==="
          su - testuser -c 'source ~/.zshrc && bun --version'
          echo "✓ bun is installed"

      - name: Verify Python virtual environment
        run: |
          echo "=== Checking Python venv ==="
          su - testuser -c 'source ~/.zshrc && source ~/.venv/bin/activate && python --version'
          echo "✓ Python venv is configured"
