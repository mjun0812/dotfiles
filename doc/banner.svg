<svg xmlns="http://www.w3.org/2000/svg" width="720" height="210" viewBox="0 0 720 210" role="img" aria-label="dotfiles">
  <defs>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7AA2F7"/>
      <stop offset="50%" stop-color="#BB9AF7"/>
      <stop offset="100%" stop-color="#7DCFFF"/>
    </linearGradient>
  </defs>
  <!-- Terminal window -->
  <rect x="0.5" y="0.5" width="719" height="209" rx="12" fill="#1A1B26" stroke="#414868"/>
  <!-- Title bar -->
  <circle cx="24" cy="24" r="6" fill="#F7768E"/>
  <circle cx="44" cy="24" r="6" fill="#E0AF68"/>
  <circle cx="64" cy="24" r="6" fill="#9ECE6A"/>
  <text x="360" y="29" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13" fill="#565F89">mjun@local: ~/.dotfiles</text>
  <line x1="0.5" y1="44" x2="719.5" y2="44" stroke="#2F3549"/>
  <!-- Prompt -->
  <text x="32" y="84" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="16">
    <tspan fill="#9ECE6A">$</tspan>
    <tspan fill="#C0CAF5" dx="8">cd ~/.dotfiles</tspan>
  </text>
  <!-- Title -->
  <text x="360" y="158" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="60" font-weight="bold" fill="url(#title)">dotfiles</text>
  <!-- Cursor -->
  <rect x="516" y="118" width="26" height="46" fill="#C0CAF5">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
